name: ML Training CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy imbalanced-learn dagshub

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          cd MLProject
          mlflow run . --env-manager=local 2>&1 | tee /tmp/mlflow_output.txt
          RUN_ID=$(grep "Run (ID" /tmp/mlflow_output.txt | grep -o "'[a-z0-9]*'" | tr -d "'")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Captured RUN_ID: $RUN_ID"

      - name: Get latest MLflow run_id
        run: echo "Run ID is ${{ env.RUN_ID }}"

      - name: Install Python dependencies
        run: pip install mlflow==2.19.0

      - name: Generate local artifact
        run: |
          cd MLProject
          MLFLOW_TRACKING_URI=mlruns python modelling.py

      - name: Upload to GitHub LFS
        run: |
          git lfs install
          git lfs track "*.pkl"
          git add .gitattributes
          git config --global user.email "fayaesph@gmail.com"
          git config --global user.name "fayaesph"
          git add -f MLProject/mlruns/
          git status
          git commit -m "Add MLflow artifacts from CI run ${{ env.RUN_ID }}" || echo "Nothing to commit"
          git push origin main

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          RUN_ID=$(cat MLProject/mlruns/*/meta.yaml | grep -o 'run_id: .*' | head -1 | awk '{print $2}' || echo "")
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(ls MLProject/mlruns/*/  | grep -v meta | head -1)
          fi
          EXPERIMENT_ID=$(ls MLProject/mlruns/ | grep -v '0' | head -1)
          RUN_ID=$(ls MLProject/mlruns/$EXPERIMENT_ID/ | grep -v meta | head -1)
          echo "Using RUN_ID: $RUN_ID"
          echo "Using EXPERIMENT_ID: $EXPERIMENT_ID"
          mlflow models build-docker \
            -m "MLProject/mlruns/$EXPERIMENT_ID/$RUN_ID/artifacts/model" \
            -n "fayaesph/diabetes-prediction" \
            --enable-mlserver

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag fayaesph/diabetes-prediction:latest fayaesph/diabetes-prediction:latest

      - name: Push Docker Image
        run: docker push fayaesph/diabetes-prediction:latest
